schema: spec-driven

context: |
  Project: ishaat.ca — personal dev blog
  Current stack: Eleventy v0.11 + TailwindCSS v3 + Gulp + Netlify
  Target stack: Quarto + Cloudflare Pages + GitHub Actions
  Domain: Currently on Porkbun, migrating to Cloudflare DNS
  Sister site: screechingintothevoid.com (already on Quarto + Cloudflare)
  Content: 3 existing blog posts with images, YouTube embeds, and giscus comments
  Author: Ishaat Chowdhury
  We use conventional commits

rules:
  proposal:
    - Always include a "Non-goals" section
    - Explain migration rationale clearly
  tasks:
    - Group tasks by domain (infrastructure, content, configuration)
    - Include verification steps for each group
