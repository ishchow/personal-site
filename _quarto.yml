project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "posts/**/*.qmd"
  resources:
    - "assets/favicon/**"

website:
  site-url: "https://www.ishaat.ca"
  favicon: assets/favicon/favicon.ico
  open-graph:
    site-name: "Ishaat Chowdhury"
  twitter-card: true
  navbar:
    title: "Ishaat Chowdhury"
    right:
      - about.qmd
      - icon: rss
        href: index.xml
  page-footer:
    center: "© 2025 Ishaat Chowdhury"
    right:
      - icon: github
        href: https://github.com/ishchow/personal-site
        aria-label: Source Code
      - icon: linkedin
        href: https://ca.linkedin.com/in/ishaatc
        aria-label: LinkedIn
      - icon: envelope
        href: mailto:ishaatchowdhury@gmail.com
        aria-label: Email

format:
  html:
    theme:
      light: flatly
      dark: darkly
    css: styles.css
    include-in-header: assets/favicon/head.html
